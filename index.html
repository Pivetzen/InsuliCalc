<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsuliCalc Pro - Automação de Dose</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-10">

    <div class="max-w-md mx-auto p-6">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">InsuliCalc</h1>
            <p class="text-slate-500 text-sm">Automação de Dose e Nutrição</p>
        </header>

        <details class="glass-card rounded-2xl p-4 shadow-md mb-6">
            <summary class="cursor-pointer text-blue-600 font-semibold flex items-center justify-between">
                <span><i class="fas fa-user-md mr-2"></i>Parâmetros Médicos</span>
                <i class="fas fa-chevron-down text-xs"></i>
            </summary>
            <div class="grid grid-cols-2 gap-4 mt-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Meta (mg/dL)</label>
                    <input type="number" id="target" value="100" class="w-full p-2 bg-slate-100 rounded-lg border-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Fator Sensib. (FS)</label>
                    <input type="number" id="fs" value="50" class="w-full p-2 bg-slate-100 rounded-lg border-none focus:ring-2 focus:ring-blue-400">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-medium text-slate-500 mb-1">Rel. Insulina/Carbo (1U para Xg)</label>
                    <input type="number" id="relCho" value="15" class="w-full p-2 bg-slate-100 rounded-lg border-none focus:ring-2 focus:ring-blue-400">
                </div>
            </div>
        </details>

        <div class="glass-card rounded-2xl p-6 shadow-xl mb-6 border-l-4 border-green-500">
            <div class="flex items-center mb-4 text-green-700">
                <i class="fas fa-utensils mr-2"></i>
                <h2 class="font-semibold text-lg">Calculadora de Alimentos</h2>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 mb-1">Tipo de Alimento</label>
                    <select id="foodSelect" onchange="updateFoodFactor()" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                        <option value="0">Selecione um alimento...</option>
                        <option value="0.28">Arroz Branco Cozido (28%)</option>
                        <option value="0.14">Feijão Carioca Cozido (14%)</option>
                        <option value="0.20">Batata Inglesa Cozida (20%)</option>
                        <option value="0.60">Pão Francês (60%)</option>
                        <option value="0.12">Maçã com Casca (12%)</option>
                        <option value="0.15">Macarrão Cozido (15%)</option>
                        <option value="1.00">Açúcar Puro / Mel (100%)</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Peso (g)</label>
                        <input type="number" id="foodWeight" oninput="calculateFoodCarbs()" placeholder="Ex: 150" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500 mb-1">Total Carbo (g)</label>
                        <input type="number" id="totalCho" class="w-full p-3 bg-slate-100 border border-slate-200 rounded-xl font-bold text-green-700" readonly>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card rounded-2xl p-6 shadow-xl mb-6 border-l-4 border-blue-500">
            <div class="flex items-center mb-4 text-slate-700">
                <i class="fas fa-drop mr-2 text-red-500"></i>
                <h2 class="font-semibold text-lg">Glicemia Atual</h2>
            </div>
            <input type="number" id="currentGlucose" placeholder="Ex: 180" class="w-full p-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none text-xl font-bold">
        </div>

        <button onclick="calculateDose()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all transform active:scale-95 mb-8">
            CALCULAR DOSE TOTAL
        </button>

        <div id="resultCard" class="hidden glass-card rounded-3xl p-8 shadow-2xl text-center border-2 border-blue-100">
            <h3 class="text-slate-500 uppercase tracking-widest text-[10px] font-bold mb-2">Dose Total Recomendada</h3>
            <div class="text-6xl font-black text-blue-600 mb-4" id="totalDose">0.0</div>
            
            <div class="grid grid-cols-2 gap-4 text-left border-t pt-4">
                <div>
                    <span class="block text-[10px] text-slate-400 uppercase">Correção</span>
                    <span class="font-bold text-slate-700" id="correctionDoseDisplay">0U</span>
                </div>
                <div>
                    <span class="block text-[10px] text-slate-400 uppercase">Alimentação</span>
                    <span class="font-bold text-slate-700" id="foodDoseDisplay">0U</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Função para calcular carboidratos com base no peso e no fator do alimento
        function calculateFoodCarbs() {
            const factor = parseFloat(document.getElementById('foodSelect').value);
            const weight = parseFloat(document.getElementById('foodWeight').value);
            
            if (factor > 0 && weight > 0) {
                const totalCarbo = weight * factor;
                document.getElementById('totalCho').value = totalCarbo.toFixed(1);
            } else {
                document.getElementById('totalCho').value = "";
            }
        }

        // Atualiza o cálculo quando muda o tipo de alimento
        function updateFoodFactor() {
            calculateFoodCarbs();
        }

        function calculateDose() {
            const target = parseFloat(document.getElementById('target').value);
            const fs = parseFloat(document.getElementById('fs').value);
            const relCho = parseFloat(document.getElementById('relCho').value);
            const currentGlucose = parseFloat(document.getElementById('currentGlucose').value);
            const totalCho = parseFloat(document.getElementById('totalCho').value) || 0;

            if (isNaN(currentGlucose)) {
                alert("Por favor, informe sua glicemia atual.");
                return;
            }

            // 1. Cálculo da Dose de Correção
            let correctionDose = 0;
            if (currentGlucose > target) {
                correctionDose = (currentGlucose - target) / fs;
            }

            // 2. Cálculo da Dose para Alimento
            let foodDose = totalCho / relCho;

            // 3. Dose Total
            const total = correctionDose + foodDose;

            // Exibir resultados
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('totalDose').innerText = total.toFixed(1) + "U";
            document.getElementById('correctionDoseDisplay').innerText = correctionDose.toFixed(1) + "U";
            document.getElementById('foodDoseDisplay').innerText = foodDose.toFixed(1) + "U";
            
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
